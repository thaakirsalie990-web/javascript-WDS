<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="error">

    </div>
    <form id="form">
        
        <div class="box 1">
            <label for="name" name="name">
                Name
            </label>
            <input type="text" name="name" for="name" id="name">
        </div>  
        <div class="box 2">
            <label for="password" name="password">
                Password
            </label>
            <input type="password" name="password" for="password" id="password">
        </div>   
        <button id="btn" type="submit">Enter</button>
    </form>
    <script src="script.js" defer></script>
</body>
</html>
